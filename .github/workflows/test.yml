name: "Code tests"

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - labeled
  merge_group:
    types: [checks_requested]
    branches:
      - main
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always # colorized output in logs
  CARGO_NET_RETRY: 10 # retries fetching Rust crates on network failures
  SCCACHE_GHA_ENABLED: "true" # enables github actions-specific logic in sccache
  RUSTC_WRAPPER: "sccache" # wraps the Rust compiler to use sccache for caching

jobs:
  test-rust:
    name: "Test Rust Project"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@65101d47ea8028ed0c98a1cdea8dd9182e9b5133 # v0.0.8
      - name: "Run Clippy (Lint)"
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: "Run Cargo Tests"
        run: ./run_tests.sh
